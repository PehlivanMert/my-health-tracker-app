<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Bakımda</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .container {
        text-align: center;
        color: #fff;
      }

      .gear {
        width: 120px;
        height: 120px;
        margin: 0 auto 30px;
        animation: spin 4s linear infinite;
      }

      .gear circle {
        fill: none;
        stroke: #4caf50;
        stroke-width: 8;
      }

      .gear path {
        fill: #4caf50;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      h1 {
        font-size: 2.5em;
        margin-bottom: 20px;
        animation: bounce 2s ease-in-out infinite;
      }

      p {
        font-size: 1.2em;
        color: #aaa;
        line-height: 1.6;
        max-width: 600px;
        margin: 0 auto;
      }

      .dots {
        display: inline-block;
      }

      .dots::after {
        content: "...";
        animation: dots 2s steps(4, end) infinite;
        display: inline-block;
        width: 0;
        overflow: hidden;
        vertical-align: bottom;
      }

      @keyframes dots {
        0%,
        20% {
          width: 0;
        }
        40% {
          width: 0.5em;
        }
        60% {
          width: 1em;
        }
        80% {
          width: 1.5em;
        }
        100% {
          width: 0;
        }
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .tools {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .tool {
        animation: float 3s ease-in-out infinite;
        font-size: 2em;
      }

      .tool:nth-child(2) {
        animation-delay: 0.2s;
      }
      .tool:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="gear" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" />
        <path
          d="M50 25l5 10h-10z M75 50l-10 5v-10z M50 75l-5-10h10z M25 50l10-5v10z"
        />
      </svg>
      <h1>Site Bakımda<span class="dots"></span></h1>
      <p>
        Sitemizi sizlere daha iyi hizmet verebilmek için güncelliyor ve
        geliştiriyoruz. Lütfen biraz sonra tekrar ziyaret edin.
      </p>
      <div class="tools">
        <div class="tool">🔧</div>
        <div class="tool">⚡</div>
        <div class="tool">🚀</div>
      </div>
    </div>
  </body>
</html>
